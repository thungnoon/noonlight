name: 24.10_X86-64

permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 20 * * 4  # 每周五 20:00 UTC

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: configs/x86_64.config
  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  SETTINGS_SH: scripts/init-settings.sh
  PACKAGES_SH: scripts/packages.sh
  CLASH_CORE_SH: scripts/preset-clash-core-amd64.sh
  ADGUARD_CORE_SH: scripts/preset-adguard-core.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查代码
      uses: actions/checkout@main

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 确保脚本可执行并清理空间
        chmod +x $FREE_DISK_SH && $FREE_DISK_SH || echo "free_disk_space.sh failed or not found"
        sudo -E apt-get -qq update -y
        sudo -E apt-get -qq full-upgrade -y
        chmod +x $ENV_SH && $ENV_SH || echo "environment.sh failed or not found"
        # 清理更多不必要的内容
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/lib/jvm /opt/hostedtoolcache
        sudo apt-get clean
        sudo apt-get autoclean
        sudo apt-get autoremove -y
        docker system prune -a -f
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        df -hT

    - name: 设置交换空间
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: 检查空间使用情况1
      if: (!cancelled())
      run: df -hT

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 开启缓存
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: '24.10_X86-64'
        prefix: ${{ github.workspace }}/openwrt

    - name: 更新 & 安装 feeds & 执行脚本
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        chmod +x $GITHUB_WORKSPACE/$SETTINGS_SH && $GITHUB_WORKSPACE/$SETTINGS_SH || echo "init-settings.sh failed"
        chmod +x $GITHUB_WORKSPACE/$PACKAGES_SH && $GITHUB_WORKSPACE/$PACKAGES_SH || echo "packages.sh failed"
        chmod +x $GITHUB_WORKSPACE/$CLASH_CORE_SH && $GITHUB_WORKSPACE/$CLASH_CORE_SH || echo "preset-clash-core-amd64.sh failed"

    - name: 导入补丁和配置 & 下载文件
      run: |
        [ -d files ] && mv files openwrt/files || echo "files directory not found"
        [ -f $CONFIG_FILE ] && cat $CONFIG_FILE >> openwrt/.config || echo "$CONFIG_FILE not found"
        cd openwrt
        make defconfig
        make download -j8 V=10
        find dl -size -1024c -exec rm -f {} \;
        df -hT

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        make defconfig
        echo "Starting 2-thread compile"
        make -j2 || make -j1 V=s
        # 检查编译结果
        if [ -d "bin/targets/x86/64" ]; then
          echo "Compilation successful"
          make clean
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "Compilation failed: bin/targets/x86/64 not found"
          df -hT
          exit 1
        fi

    - name: 检查空间使用情况2
      if: (!cancelled())
      run: df -hT

    - name: 调试目录结构
      if: steps.compile.outputs.status == 'success'
      run: |
        ls -la openwrt/bin/targets/ || echo "targets directory not found"
        ls -la openwrt/bin/targets/x86/ || echo "x86 directory not found"
        ls -la openwrt/bin/targets/x86/64/ || echo "64 directory not found"

    - name: 上传 bin 目录
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理文件
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/x86/64 || { echo "Target directory not found"; exit 1; }
        rm -rf *.bin *.buildinfo *.json *.manifest packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件目录
      uses: actions/upload-artifact@main
      if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成发布标签
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        echo -e "✅ 24.10 源码 X86-64 平台\n" >> release.txt
        echo "release_tag=$(date +"%Y.%m.%d-24.10_X86-64")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到发布
      uses: softprops/action-gh-release@v2.0.4
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: 删除以前发布的固件
      uses: dev-drprasad/delete-older-releases@v0.3.3
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 6
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除以前的工作流程
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 5