name: 24.10_X86-64

permissions: write-all

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 20 * * 4

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: configs/x86_64.config
  FREE_DISK_SH: scripts/free_disk_space.sh
  ENV_SH: scripts/environment.sh
  SETTINGS_SH: scripts/init-settings.sh
  PACKAGES_SH: scripts/packages.sh
  CLASH_CORE_SH: scripts/preset-clash-core-amd64.sh
  ADGUARD_CORE_SH: scripts/preset-adguard-core.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查代码
      uses: actions/checkout@main

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        chmod +x $FREE_DISK_SH && $FREE_DISK_SH
        sudo apt-get -qq update -y
        sudo apt-get -qq full-upgrade -y
        sudo apt-get clean
        sudo apt-get autoremove -y
        docker system prune -a -f
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源码
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 开启缓存
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: '24.10_X86-64'
        prefix: ${{ github.workspace }}/openwrt

    - name: 更新 & 安装 feeds & 执行脚本
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        chmod +x $GITHUB_WORKSPACE/$SETTINGS_SH && $GITHUB_WORKSPACE/$SETTINGS_SH
        chmod +x $GITHUB_WORKSPACE/$PACKAGES_SH && $GITHUB_WORKSPACE/$PACKAGES_SH
        chmod +x $GITHUB_WORKSPACE/$CLASH_CORE_SH && $GITHUB_WORKSPACE/$CLASH_CORE_SH

    - name: 导入配置 & 下载文件
      run: |
        cp $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig
        make download -j8 V=s

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        make -j2 V=s || make -j1 V=s
        if ls bin/targets/*/* >/dev/null 2>&1; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "Compilation failed: No firmware generated"
          exit 1
        fi

    - name: 整理文件
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        # 只删除非固件文件，保留 .img 或 .gz 等固件
        rm -rf *.buildinfo *.json *.manifest packages
        ls -la  # 检查剩余文件
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 生成发布标签
      id: tag
      if: steps.compile.outputs.status == 'success'
      run: |
        TAG_NAME=$(date +'%Y.%m.%d-24.10_X86-64')
        echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV

    - name: 清理临时文件
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        make clean

    - name: 上传固件到发布
      uses: softprops/action-gh-release@v2.0.4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        body: "✅ 24.10 源码 X86-64 平台"
        files: ${{ env.FIRMWARE }}/*

    - name: 删除以前发布的固件
      uses: dev-drprasad/delete-older-releases@v0.3.3
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 6
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
